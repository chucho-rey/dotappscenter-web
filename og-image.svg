<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ffffff" fill-opacity="0.06"/>
    </pattern>
    <radialGradient id="glow" cx="82%" cy="28%" r="55%">
      <stop offset="0%" stop-color="#ed1c24" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ed1c24" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#000000"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Brand dots mark (on on off on) -->
  <g transform="translate(96,150)">
    <rect x="0"  y="0" width="22" height="22" rx="3" fill="#ed1c24"/>
    <rect x="32" y="0" width="22" height="22" rx="3" fill="#ed1c24"/>
    <rect x="64" y="0" width="22" height="22" rx="3" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="2"/>
    <rect x="96" y="0" width="22" height="22" rx="3" fill="#ed1c24"/>
  </g>

  <!-- Wordmark -->
  <text x="94" y="300" font-family="'DotGothic16','DejaVu Sans Mono','Courier New',monospace"
        font-size="92" font-weight="700" fill="#ffffff" letter-spacing="2">DotAppsCenter</text>

  <!-- Red accent underline -->
  <rect x="98" y="330" width="170" height="8" rx="4" fill="#ed1c24"/>

  <!-- Tagline -->
  <text x="98" y="404" font-family="'Space Grotesk','DejaVu Sans',Arial,sans-serif"
        font-size="34" font-weight="500" fill="#ffffff" fill-opacity="0.62">Apps Android minimalistas · privadas y sin anuncios</text>

  <!-- App chips -->
  <g font-family="'Space Grotesk','DejaVu Sans',Arial,sans-serif" font-size="26" font-weight="500">
    <g transform="translate(98,470)">
      <rect width="210" height="64" rx="14" fill="#141414"/>
      <circle cx="34" cy="32" r="5" fill="#ed1c24"/>
      <text x="58" y="41" fill="#ffffff">DotNotes</text>
    </g>
    <g transform="translate(324,470)">
      <rect width="288" height="64" rx="14" fill="#141414"/>
      <circle cx="34" cy="32" r="5" fill="#ed1c24"/>
      <text x="58" y="41" fill="#ffffff">DotPodómetro</text>
    </g>
    <g transform="translate(628,470)">
      <rect width="176" height="64" rx="14" fill="#141414"/>
      <circle cx="34" cy="32" r="5" fill="#ed1c24"/>
      <text x="58" y="41" fill="#ffffff">DotPDF</text>
    </g>
  </g>

  <!-- Oversized dot motif, right side -->
  <circle cx="1040" cy="190" r="70" fill="#ed1c24" fill-opacity="0.9"/>
  <circle cx="1040" cy="190" r="70" fill="none" stroke="#ed1c24" stroke-opacity="0.25" stroke-width="40"/>
</svg>
